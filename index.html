  'crpc-41': { act: 'CrPC', number: '41', title: 'When police may arrest without warrant', simplified: 'A police officer can arrest without a warrant only in specific situations — typically for cognizable offences (serious crimes) with reasonable grounds. For offences punishable with up to 7 years, the officer must record reasons.', source: 'Section 41, Code of Criminal Procedure, 1973' },

  'crpc-50': { act: 'CrPC', number: '50(1)', title: 'Right to know grounds of arrest', simplified: 'A person arrested without a warrant must be informed, as soon as possible, of the grounds of arrest. For bailable offences, they must also be informed of the right to bail.', source: 'Section 50, CrPC; Article 22(1), Constitution of India' },
  'crpc-50a': { act: 'CrPC', number: '50A', title: 'Right to inform a relative of arrest', simplified: 'Police must inform a nominated relative or friend of the person\'s arrest and the place of detention. This right attaches from the moment of arrest.', source: 'Section 50A, CrPC; D.K. Basu v. State of West Bengal (1997)' },
  'crpc-100': { act: 'CrPC', number: '100', title: 'Persons in charge of closed place to allow search', simplified: 'A search must generally be conducted in the presence of at least two independent local witnesses. The person searched has the right to a list of items seized, signed by the witnesses.', source: 'Section 100, CrPC' },
  'crpc-165': { act: 'CrPC', number: '165', title: 'Search by police officer', simplified: 'Police can search without a warrant only where they have reasonable grounds to believe a thing necessary for investigation may be found, and they must record reasons in writing before the search.', source: 'Section 165, CrPC' },
  'art-20-3': { act: 'Constitution', number: 'Art. 20(3)', title: 'Right against self-incrimination', simplified: 'No person accused of an offence can be compelled to be a witness against themselves. You cannot be forced to confess or give testimony that incriminates you.', source: 'Article 20(3), Constitution of India' },
  'art-21': { act: 'Constitution', number: 'Art. 21', title: 'Right to life and personal liberty', simplified: 'No person shall be deprived of life or personal liberty except according to procedure established by law — and that procedure must be fair, just, and reasonable.', source: 'Article 21, Constitution of India; Maneka Gandhi v. Union of India (1978)' },
  'art-22-1': { act: 'Constitution', number: 'Art. 22(1)', title: 'Rights on arrest', simplified: 'Every person arrested has the right to be informed of the grounds of arrest and the right to consult and be defended by a lawyer of their choice.', source: 'Article 22(1), Constitution of India' },
  'art-22-2': { act: 'Constitution', number: 'Art. 22(2)', title: 'Production before magistrate', simplified: 'Every person arrested must be produced before a magistrate within 24 hours of arrest, excluding travel time. Detention beyond 24 hours requires the magistrate\'s order.', source: 'Article 22(2), Constitution of India' },
  'art-19-1-b': { act: 'Constitution', number: 'Art. 19(1)(b)', title: 'Right to assemble peaceably', simplified: 'All citizens have the right to assemble peaceably and without arms. This right is subject to reasonable restrictions in the interest of public order and sovereignty.', source: 'Article 19(1)(b), Constitution of India' },
  'posh-4': { act: 'POSH Act', number: 'S. 4', title: 'Internal Complaints Committee', simplified: 'Every employer with 10 or more employees must constitute an Internal Complaints Committee (ICC) at each workplace location to receive and inquire into sexual harassment complaints.', source: 'Section 4, Sexual Harassment of Women at Workplace (Prevention, Prohibition and Redressal) Act, 2013' },
  'posh-9': { act: 'POSH Act', number: 'S. 9', title: 'Complaint timeline', simplified: 'A complaint of sexual harassment should be filed within three months of the incident (or the last of a series of incidents). The ICC can extend this by up to three more months in writing if satisfied that circumstances prevented timely filing.', source: 'Section 9, POSH Act, 2013' },
  'mat-12': { act: 'Maternity Benefit Act', number: 'S. 12', title: 'Dismissal during pregnancy', simplified: 'A woman absent on maternity leave cannot be dismissed, and any dismissal during pregnancy or leave that deprives her of maternity benefits is unlawful.', source: 'Section 12, Maternity Benefit Act, 1961' },
  'cpa-2-47': { act: 'Consumer Protection Act', number: 'S. 2(47)', title: 'Unfair trade practice', simplified: 'Misleading the consumer about quality, quantity, or performance, or withholding material information, is an unfair trade practice and actionable under consumer law.', source: 'Section 2(47), Consumer Protection Act, 2019' },
  'cpa-ec-4': { act: 'CPA E-Commerce Rules', number: 'Rule 4', title: 'Duties of e-commerce entities', simplified: 'E-commerce entities must display seller information, provide a clear return and refund policy, and cannot manipulate prices or impose conditions that are unfair to consumers. Platforms are liable for the products listed.', source: 'Rule 4, Consumer Protection (E-Commerce) Rules, 2020' },
  'it-66c': { act: 'IT Act', number: 'S. 66C', title: 'Identity theft', simplified: 'Dishonestly or fraudulently using another person\'s electronic signature, password, or any other unique identification is punishable with imprisonment up to 3 years and fine up to ₹1 lakh.', source: 'Section 66C, Information Technology Act, 2000' },
  'it-66d': { act: 'IT Act', number: 'S. 66D', title: 'Cheating by personation using computer', simplified: 'Cheating by impersonation using a computer resource or communication device is punishable with imprisonment up to 3 years and fine up to ₹1 lakh.', source: 'Section 66D, IT Act, 2000' },
  'it-66e': { act: 'IT Act', number: 'S. 66E', title: 'Violation of privacy', simplified: 'Capturing, publishing or transmitting a private image of another person without consent — under circumstances violating their privacy — is punishable with imprisonment up to 3 years and fine up to ₹2 lakh.', source: 'Section 66E, IT Act, 2000' },
  'it-67': { act: 'IT Act', number: 'S. 67', title: 'Obscene content', simplified: 'Publishing or transmitting obscene material in electronic form is a criminal offence, punishable on first conviction with imprisonment up to 3 years and fine up to ₹5 lakh.', source: 'Section 67, IT Act, 2000' },
  'rte-12': { act: 'RTE Act', number: 'S. 12(1)(c)', title: 'Private school reservation', simplified: 'Private unaided schools must admit at least 25% of their entry-level class from children of economically weaker sections and disadvantaged groups in the neighborhood, and provide free education until Class 8.', source: 'Section 12(1)(c), Right of Children to Free and Compulsory Education Act, 2009' },

/* ============================================================
   SM-2 SPACED REPETITION ALGORITHM
   Maps user correctness to quality (0-5) and computes next due date.
   ============================================================ */

function sm2(current, quality) {
  let { ease_factor = 2.5, repetitions = 0, interval_days = 0 } = current || {};

  if (quality < 3) {
    repetitions = 0;
    interval_days = 1;
  } else {
    repetitions += 1;
    if (repetitions === 1) interval_days = 1;
    else if (repetitions === 2) interval_days = 3;
    else interval_days = Math.max(1, Math.round(interval_days * ease_factor));
    ease_factor = Math.max(1.3, ease_factor + 0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02));
  }
  const next_due = new Date(Date.now() + interval_days * 86400000).toISOString();
  return { ease_factor, repetitions, interval_days, next_due };
}

// Quality mapping: correct first try=5, correct slow=4, incorrect but close=2, incorrect=1
function qualityFromAttempt(isCorrect, responseMs) {
  if (isCorrect) return responseMs < 15000 ? 5 : 4;
  return responseMs < 30000 ? 2 : 1;
}

const STORAGE_KEY = 'adhikar_state_v1';

function defaultState() {
  return {
    attempts: {},      // scenario_id -> [{ choice_id, is_correct, response_ms, ts }]
    schedule: {},      // scenario_id -> SM-2 state
    bookmarks: [],
    streak: 0,
    lastActiveDate: null,
    language: 'en',
    literacyLevel: 1,
    completedOnboarding: false,
    interests: [],
    dailyGoalMinutes: 10,
    adminDecisions: {},  // contribution_id -> 'approved'|'rejected'|'escalated'
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    return { ...defaultState(), ...JSON.parse(raw) };
  } catch {
    return defaultState();
  }
}

function saveState(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {}
}

/* ============================================================
   DAILY LEARN VIEW — scenario queue
   ============================================================ */

function DailyLearnView({ state, setState, setView }) {
  const [queue, setQueue] = useState(() => buildQueue(state));
  const [currentIdx, setCurrentIdx] = useState(0);
  const [sessionStats, setSessionStats] = useState({ correct: 0, total: 0 });

  function buildQueue(s) {
    const filterDomain = s._filterDomain;
    const now = Date.now();
    const dueIds = Object.entries(s.schedule)
      .filter(([_, sch]) => new Date(sch.next_due).getTime() <= now)
      .map(([id]) => id);
    const due = SCENARIOS.filter(sc => dueIds.includes(sc.id));
    const neverAttempted = SCENARIOS.filter(sc => !s.attempts[sc.id]);
    let pool = [...due];
    for (const s_ of neverAttempted) { if (pool.length < 5) pool.push(s_); }
    if (filterDomain) pool = pool.filter(sc => sc.domain === filterDomain);
    // shuffle lightly
    return pool.slice(0, 5);
  }

  const current = queue[currentIdx];

  if (!current) {
    return (
      <div className="max-w-2xl mx-auto px-4 sm:px-6 py-12 fade-in">
        <Card className="p-8 text-center">
          <div className="text-4xl mb-3">✨</div>
          <h2 className="font-serif text-2xl mb-2">Nothing due today</h2>
          <p className="text-slate-600 mb-6">You've caught up. Come back tomorrow, or explore a new domain.</p>
          <div className="flex gap-2 justify-center">
            <Button onClick={() => setView('home')} variant="secondary">Back home</Button>
            <Button onClick={() => { setState(s => ({ ...s, _filterDomain: null })); setQueue(buildQueue({ ...state, _filterDomain: null })); setCurrentIdx(0); }}>Practice any domain</Button>
          </div>
        </Card>
      </div>
    );
  }

  function onAttemptComplete(isCorrect, responseMs, choiceId) {
    setState(s => {
      const q = qualityFromAttempt(isCorrect, responseMs);
      const sched = sm2(s.schedule[current.id], q);
      const attempt = { choice_id: choiceId, is_correct: isCorrect, response_ms: responseMs, ts: new Date().toISOString() };
      const prevAttempts = s.attempts[current.id] || [];
      // Update streak
      const today = new Date().toDateString();
      let streak = s.streak;
      if (s.lastActiveDate !== today) {
        const yday = new Date(Date.now() - 86400000).toDateString();
        streak = (s.lastActiveDate === yday ? s.streak + 1 : 1);
      }
      return {
        ...s,
        attempts: { ...s.attempts, [current.id]: [...prevAttempts, attempt] },
        schedule: { ...s.schedule, [current.id]: sched },
        streak,
        lastActiveDate: today,
      };
    });
    setSessionStats(st => ({ correct: st.correct + (isCorrect ? 1 : 0), total: st.total + 1 }));
  }

  function advance() {
    setCurrentIdx(i => i + 1);
  }

  // End-of-session
  if (currentIdx >= queue.length) {
    return (
      <div className="max-w-2xl mx-auto px-4 sm:px-6 py-12 fade-in">
        <Card className="p-8 text-center">
          <div className="text-4xl mb-3">🌱</div>
          <h2 className="font-serif text-2xl mb-2">Session complete</h2>
          <p className="text-slate-600 mb-2">You got <strong>{sessionStats.correct} of {sessionStats.total}</strong> correct.</p>
          <p className="text-slate-500 text-sm mb-6">{sessionStats.correct === sessionStats.total ? 'Perfect. We\'ll re-test these at longer intervals.' : 'The ones you missed will surface again soon — that\'s how the spaced repetition works.'}</p>
          <div className="flex gap-2 justify-center">
            <Button onClick={() => setView('progress')} variant="secondary">See progress</Button>
            <Button onClick={() => setView('home')}>Back home</Button>
          </div>
        </Card>
      </div>
    );
  }

  return (
    <div className="max-w-2xl mx-auto px-4 sm:px-6 py-6 fade-in">
      {/* progress strip */}
      <div className="flex items-center gap-2 mb-4 text-xs text-slate-500">
        <span>{currentIdx + 1} of {queue.length}</span>
        <div className="flex-1 h-1 bg-slate-200 rounded-full overflow-hidden">
          <div className="h-full bg-slate-900 transition-all" style={{ width: `${((currentIdx) / queue.length) * 100}%` }}></div>
        </div>
        <button onClick={() => setView('home')} className="text-slate-400 hover:text-slate-600">Exit</button>
      </div>
      <ScenarioCard key={current.id} scenario={current} onComplete={onAttemptComplete} onNext={advance} />
    </div>
  );
}

function ScenarioCard({ scenario, onComplete, onNext }) {
  const [selected, setSelected] = useState(null);
  const [revealed, setRevealed] = useState(false);
  const [startTime] = useState(Date.now());
  const [showLaw, setShowLaw] = useState(false);

  function handleSelect(choice) {
    if (revealed) return;
    setSelected(choice.id);
    setRevealed(true);
    const responseMs = Date.now() - startTime;
    onComplete(choice.correct, responseMs, choice.id);
  }

  const domainTone = ({ police: 'blue', workplace: 'amber', consumer: 'purple', housing: 'emerald', cyber: 'rose', education: 'teal' }[scenario.domain]) || 'slate';

  return (
    <Card className="overflow-hidden">

          <Pill tone={domainTone}>{scenario.domain}</Pill>

        <div className="text-xs uppercase tracking-wider text-slate-500 mb-2">What is the legally correct answer?</div>
        {scenario.choices.map(choice => {
          const isSelected = selected === choice.id;
          let classes = 'border-slate-200 hover:border-slate-400 bg-white';
          if (revealed) {
            if (choice.correct) classes = 'border-emerald-500 bg-emerald-50';
            else if (isSelected && !choice.correct) classes = 'border-rose-400 bg-rose-50';
            else classes = 'border-slate-200 bg-white opacity-60';
          } else if (isSelected) {
            classes = 'border-slate-900 bg-slate-50';
          }
          return (
            <button
              key={choice.id}
              onClick={() => handleSelect(choice)}
              disabled={revealed}
              className={`w-full text-left p-4 rounded-lg border-2 transition ${classes} ${revealed ? 'cursor-default' : 'cursor-pointer'}`}
            >
              <div className="flex gap-3">
                <div className={`flex-none w-6 h-6 rounded-full border-2 flex items-center justify-center text-xs font-semibold ${revealed && choice.correct ? 'bg-emerald-500 border-emerald-500 text-white' : revealed && isSelected ? 'bg-rose-400 border-rose-400 text-white' : 'border-slate-300 text-slate-500'}`}>

                </div>
                <div className="flex-1">
                  <div className="text-sm text-slate-900 mb-1">{choice.text}</div>

                    <div className={`text-xs mt-2 pt-2 border-t ${choice.correct ? 'border-emerald-200 text-emerald-900' : 'border-slate-200 text-slate-600'}`}>
                      {choice.explanation}
                    </div>
                  )}
                </div>
              </div>
            </button>
          );
        })}
      </div>

      {revealed && (
        <div className="p-5 sm:p-6 pt-0 space-y-3 fade-in">
          <div className="bg-slate-50 rounded-lg p-4">
            <button onClick={() => setShowLaw(!showLaw)} className="flex items-center justify-between w-full text-left">
              <div className="text-xs uppercase tracking-wider text-slate-500">Read the actual law {showLaw ? '▾' : '▸'}</div>
            </button>

              <div className="mt-3 space-y-3 fade-in">

                  return (
                    <div key={lid} className="text-sm">

function RadarChart({ data }) {
  const size = 240;
  const cx = size / 2;
  const cy = size / 2;
  const r = size / 2 - 30;
  const angles = data.map((_, i) => (Math.PI * 2 * i) / data.length - Math.PI / 2);

  const ringPath = (ratio) => {
    return data.map((_, i) => {
      const a = angles[i];
      const x = cx + Math.cos(a) * r * ratio;
      const y = cy + Math.sin(a) * r * ratio;
      return `${i === 0 ? 'M' : 'L'}${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(' ') + ' Z';
  };

  const dataPath = data.map((d, i) => {
    const a = angles[i];
    const ratio = Math.max(0.04, d.mastery); // min visible
    const x = cx + Math.cos(a) * r * ratio;
    const y = cy + Math.sin(a) * r * ratio;
    return `${i === 0 ? 'M' : 'L'}${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ') + ' Z';

  return (
    <svg viewBox={`0 0 ${size} ${size}`} className="w-full max-w-xs mx-auto">
      {[0.25, 0.5, 0.75, 1].map(ratio => (
        <path key={ratio} d={ringPath(ratio)} className="radar-axis" />
      ))}
      {data.map((d, i) => {
        const a = angles[i];
        const x = cx + Math.cos(a) * r;
        const y = cy + Math.sin(a) * r;
        return <line key={i} x1={cx} y1={cy} x2={x} y2={y} className="radar-axis" />;
      })}
      <path d={dataPath} className="radar-data" />
      {data.map((d, i) => {
        const a = angles[i];
        const x = cx + Math.cos(a) * (r + 16);
        const y = cy + Math.sin(a) * (r + 16);
        return (
          <text key={i} x={x} y={y} textAnchor="middle" dominantBaseline="middle" className="fill-slate-600" style={{ fontSize: '10px', textTransform: 'capitalize' }}>
            {d.domain}
          </text>
        );
      })}
    </svg>
  );
}

          <div className="p-6 border-b border-slate-100">
            <div className="text-xs uppercase tracking-wider text-slate-500 mb-3">Automated pre-check results</div>
            <div className="grid grid-cols-2 sm:grid-cols-5 gap-2">
              {Object.entries(c.autoChecks).map(([k, v]) => (
                <div key={k} className={`p-2 rounded-lg text-xs ${v === 'pass' ? 'bg-emerald-50 text-emerald-800' : v === 'warn' ? 'bg-amber-50 text-amber-800' : 'bg-rose-50 text-rose-800'}`}>
                  <div className="font-medium capitalize">{k.replace(/([A-Z])/g, ' $1').trim()}</div>
                  <div>{v === 'pass' ? '✓ pass' : v === 'warn' ? '⚠ warn' : '✕ fail'}</div>
                </div>
              ))}
            </div>
            {c.reviewerNote && (
              <div className="mt-3 p-3 bg-amber-50 border border-amber-200 rounded-lg text-sm text-amber-900">
                <strong>Auto-flag note:</strong> {c.reviewerNote}
              </div>
            )}
          </div>

          {/* Content */}
          {c.type === 'scenario' && (
            <div className="p-6 border-b border-slate-100 space-y-4">
              <div>
                <div className="text-xs uppercase tracking-wider text-slate-500 mb-2">Situation</div>
                <div className="law-text text-slate-700">{c.situation}</div>
              </div>
              <div>
                <div className="text-xs uppercase tracking-wider text-slate-500 mb-2">Choices</div>
                <div className="space-y-2">
                  {c.choices.map((ch, i) => (
                    <div key={i} className={`p-3 rounded-lg border ${ch.correct ? 'border-emerald-300 bg-emerald-50' : 'border-slate-200 bg-white'}`}>
                      <div className="text-sm text-slate-900">{ch.correct && '✓ '} {ch.text}</div>
                      <div className="text-xs text-slate-600 mt-1">{ch.explanation}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
          {c.type === 'simplification' && (
            <div className="p-6 border-b border-slate-100 space-y-4">
              <div>
                <div className="text-xs uppercase tracking-wider text-slate-500 mb-2">Original statutory text</div>
                <div className="law-text text-slate-700 p-3 bg-slate-50 rounded-lg">{c.original}</div>
              </div>
              <div>
                <div className="text-xs uppercase tracking-wider text-slate-500 mb-2">Proposed simplification</div>
                <div className="law-text text-slate-900 p-3 bg-amber-50 rounded-lg border border-amber-200">{c.proposed}</div>
              </div>
            </div>
          )}

          {/* Decision panel */}
          <div className="p-6 bg-slate-50">
            <div className="text-xs uppercase tracking-wider text-slate-500 mb-3">Review decision</div>
            <div className="flex flex-wrap gap-2">
              <Button variant="success" onClick={() => decide(c.id, 'approved')}>✓ Approve</Button>
              <Button variant="secondary" onClick={() => decide(c.id, 'approved_with_edits', 'Requires minor copy edits before publishing.')}>✎ Approve with edits</Button>
              <Button variant="ghost" onClick={() => decide(c.id, 'escalated', 'Escalated to Tier 2.')}>↑ Escalate to Tier 2</Button>
              <Button variant="danger" onClick={() => decide(c.id, 'rejected', 'See rejection codes.')}>✕ Reject</Button>
            </div>
            <div className="text-xs text-slate-500 mt-3">
              Rejection codes available: R1 overstated right · R2 missing exception · R3 wrong actor · R4 citation mismatch · R5 misleading distractor · R6 language too complex
            </div>
          </div>
        </Card>
      </div>
    );
  }

  return (
    <div className="max-w-5xl mx-auto px-4 sm:px-6 py-8 space-y-6 fade-in">
      <div className="flex items-center justify-between flex-wrap gap-3">
        <div>
          <h2 className="font-serif text-3xl text-slate-900">Legal Reviewer Console</h2>
          <p className="text-sm text-slate-500">Tier 1 & Tier 2 moderation of community contributions and AI-drafted scenarios.</p>
        </div>
        <Pill tone="amber">Admin mode</Pill>
      </div>

      <div className="grid md:grid-cols-4 gap-3">
        <StatCard label="In queue" value={pending.length} tone="amber" />
        <StatCard label="Reviewed today" value={reviewed.length} tone="slate" />
        <StatCard label="Scenarios live" value={SCENARIOS.length} tone="emerald" />
        <StatCard label="Law sections" value={Object.keys(LAW_SECTIONS).length} tone="blue" />
      </div>

      <div className="flex border-b border-slate-200">
        {['queue', 'reviewed', 'pipeline'].map(t => (
          <button
            key={t}
            onClick={() => setTab(t)}
            className={`px-4 py-2 text-sm font-medium capitalize border-b-2 -mb-px ${tab === t ? 'border-slate-900 text-slate-900' : 'border-transparent text-slate-500 hover:text-slate-700'}`}
          >{t}</button>
        ))}
      </div>

      {tab === 'queue' && (
        <div className="space-y-2">
          {pending.length === 0 && <Card className="p-8 text-center text-slate-500 text-sm">Queue is empty. Nothing waiting for review.</Card>}
          {pending.map(c => (
            <button
              key={c.id}
              onClick={() => setActiveContrib(c)}
              className="w-full text-left p-4 bg-white rounded-xl card-shadow hover:-translate-y-0.5 transition"
            >
              <div className="flex items-center gap-2 mb-1">
                <Pill tone="amber">{c.type}</Pill>
                <Pill tone="blue">{c.domain}</Pill>
                {c.flaggedCodes.length > 0 && <Pill tone="rose">⚑ {c.flaggedCodes.join(', ')}</Pill>}
                <Pill>Suggested: {c.suggestedReviewer}</Pill>
              </div>
              <div className="font-semibold text-slate-900">{c.title}</div>
              <div className="text-xs text-slate-500 mt-1">
                <strong>{c.contributor}</strong> · rep {c.reputation} · {new Date(c.submittedAt).toLocaleString()}
              </div>
            </button>
          ))}
        </div>
      )}

      {tab === 'reviewed' && (
        <div className="space-y-2">
          {reviewed.length === 0 && <Card className="p-8 text-center text-slate-500 text-sm">No decisions recorded yet.</Card>}
          {reviewed.map(c => {
            const d = decisions[c.id];
            return (
              <Card key={c.id} className="p-4 flex items-center gap-3">
                <div>
                  <Pill tone={d.decision === 'approved' || d.decision === 'approved_with_edits' ? 'emerald' : d.decision === 'rejected' ? 'rose' : 'amber'}>
                    {d.decision.replace('_', ' ')}
                  </Pill>
                </div>
                <div className="flex-1">
                  <div className="font-semibold text-slate-900 text-sm">{c.title}</div>
                  <div className="text-xs text-slate-500">by {c.contributor} · decided {new Date(d.at).toLocaleString()}</div>
                </div>
              </Card>
            );
          })}
        </div>
      )}

      {tab === 'pipeline' && <PipelineView />}
    </div>
  );
}

function StatCard({ label, value, tone='slate' }) {
  const tones = {
    slate: 'bg-white',
    amber: 'bg-amber-50',
    emerald: 'bg-emerald-50',
    blue: 'bg-blue-50',
    rose: 'bg-rose-50',
  };
  return (
    <div className={`p-5 rounded-2xl card-shadow ${tones[tone]}`}>
      <div className="text-xs uppercase tracking-wider text-slate-500">{label}</div>
      <div className="text-3xl font-semibold text-slate-900 mt-1">{value}</div>
    </div>
  );
}

function PipelineView() {
  const stages = [
    { id: 1, name: 'Raw source ingested', status: 'done', info: 'India Code PDFs, PRS, cybercrime.gov.in advisories' },
    { id: 2, name: 'Clean & normalize', status: 'done', info: 'Section numbering normalized, headers stripped' },
    { id: 3, name: 'Entity extraction', status: 'done', info: 'LegalBERT-India pipeline; 1,284 actor/action pairs' },
    { id: 4, name: 'AI scenario drafting', status: 'running', info: 'Batch 2026-04-19 · 23 of 50 drafts produced' },
    { id: 5, name: 'Automated pre-checks', status: 'running', info: 'Schema, citation existence, contradiction, duplicate (0.85 threshold)' },
    { id: 6, name: 'Tier 1 review', status: 'queued', info: `${INITIAL_PENDING.length} items in queue` },
    { id: 7, name: 'Tier 2 review', status: 'queued', info: 'Advocate/law professor sign-off' },
    { id: 8, name: 'Published to pool', status: 'live', info: `${SCENARIOS.length} scenarios currently served` },
  ];
  return (
    <Card className="p-6">
      <div className="text-xs uppercase tracking-wider text-slate-500 mb-4">Content pipeline status</div>
      <div className="space-y-3">
        {stages.map(s => (
          <div key={s.id} className="flex items-center gap-3 text-sm">
            <div className={`w-8 h-8 rounded-full flex items-center justify-center flex-none font-semibold text-xs ${
              s.status === 'done' ? 'bg-emerald-500 text-white' :
              s.status === 'running' ? 'bg-amber-500 text-white pulse-dot' :
              s.status === 'live' ? 'bg-blue-500 text-white' :
              'bg-slate-200 text-slate-500'
            }`}>
              {s.status === 'done' ? '✓' : s.status === 'live' ? '●' : s.id}
            </div>
            <div className="flex-1">
              <div className="font-medium text-slate-900">{s.name}</div>
              <div className="text-xs text-slate-500">{s.info}</div>
            </div>
            <Pill tone={
              s.status === 'done' ? 'emerald' :
              s.status === 'running' ? 'amber' :
              s.status === 'live' ? 'blue' :
              'slate'
            }>{s.status}</Pill>
          </div>
        ))}
      </div>
    </Card>
  );
}

/* ============================================================
   ROOT APP
   ============================================================ */

function App() {
  const [state, setState] = useState(loadState);
  const [view, setView] = useState('home');
  const [adminMode, setAdminMode] = useState(false);

  useEffect(() => { saveState(state); }, [state]);

  return (
    <div className="min-h-screen bg-stone-50 text-slate-900">
      <TopNav view={view} setView={setView} streak={state.streak} adminMode={adminMode} setAdminMode={setAdminMode} />
      <main>
        {view === 'home' && <HomeView state={state} setState={setState} setView={setView} />}
        {view === 'learn' && <DailyLearnView state={state} setState={setState} setView={setView} />}
        {view === 'situation' && <SituationView setView={setView} />}
        {view === 'progress' && <ProgressView state={state} />}
        {view === 'admin' && <AdminView state={state} setState={setState} />}
      </main>
      <footer className="max-w-6xl mx-auto px-4 sm:px-6 py-8 mt-12 text-xs text-slate-400 text-center">
        Adhikar · Legal literacy for India · This platform provides educational content only and is not a substitute for legal advice.
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
